# This workflow runs every time you push to the main branch.
# It builds the Spring Boot app and deploys it to Azure App Service.

name: Deploy Backend to Azure

# TRIGGER: When does this run?
on:
  push:
    branches: [main]  # Only on pushes to main (not feature branches)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest  # GitHub provides a free Linux VM to run this

    steps:
      # Step 1: Download your code into the VM
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Java 21 on the VM
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'  # Caches dependencies so future builds are faster

      # Step 3: Build the JAR (skip tests for faster deploys)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Step 4: Login to Azure using Service Principal credentials
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Step 5: Deploy the JAR to Azure App Service
      - name: Deploy to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: saas-todo-backend
          package: target/*.jar
